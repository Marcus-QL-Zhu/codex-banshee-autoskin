name: Windows offline checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-windows:
    name: Node ${{ matrix.node }} / Windows
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.4.1
          - 24.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run release hygiene and offline tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File tools\release-check.ps1
